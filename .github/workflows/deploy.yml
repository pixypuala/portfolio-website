name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, write Pages, mint the deploy id token.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight Pages deploy; queue the next one instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
