name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Static site smoke checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required accessibility/SEO basics present
        run: |
          set -e
          grep -q '<html lang="en">' site/index.html
          grep -q '<title>' site/index.html
          grep -q 'class="skip-link"' site/index.html
          grep -q 'name="viewport"' site/index.html
          grep -q 'property="og:title"' site/index.html
          grep -q 'property="og:image"' site/index.html
          grep -q 'name="twitter:card"' site/index.html
          test -f site/styles.css
          test -f site/og-image.svg
          test -f site/og-image.png
          # og-image.png must be a real 1200x630 PNG (raster share image scrapers prefer).
          python3 -c "import struct,sys; d=open('site/og-image.png','rb').read(); assert d[:8]==b'\x89PNG\r\n\x1a\n', 'not a PNG'; w,h=struct.unpack('>II', d[16:24]); print('og-image.png', w, 'x', h); sys.exit(0 if (w,h)==(1200,630) else 1)"
      - name: Case-study pages present and accessible
        run: |
          set -e
          for slug in resilient-woocommerce enterprise-fse-publishing updateproof; do
            page="site/case-studies/$slug.html"
            test -f "$page"
            grep -q '<html lang="en">' "$page"
            grep -q '<title>' "$page"
            grep -q 'class="skip-link"' "$page"
            grep -q 'name="viewport"' "$page"
            grep -q 'href="../index.html"' "$page"
          done
      - name: Local asset references resolve
        run: |
          # Every href/src pointing at a local file must exist, resolved
          # relative to the referencing page so subfolder depth stays correct.
          # Absolute URLs (http:, mailto:) carry a colon and are skipped by
          # the character class; fragments are skipped by the '#' exclusion.
          set -e
          status=0
          for html in $(find site -name '*.html'); do
            dir=$(dirname "$html")
            for asset in $(grep -oE '(href|src)="[^"#:]+\.(css|js|png|jpg|svg)"' "$html" | sed -E 's/.*="([^"]+)"/\1/'); do
              if [ ! -f "$dir/$asset" ]; then
                echo "Missing asset: $asset (referenced in $html)"
                status=1
              fi
            done
          done
          exit $status
