name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Static site smoke checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required accessibility/SEO basics present
        run: |
          set -e
          grep -q '<html lang="en">' site/index.html
          grep -q '<title>' site/index.html
          grep -q 'class="skip-link"' site/index.html
          grep -q 'name="viewport"' site/index.html
          grep -q 'property="og:title"' site/index.html
          grep -q 'name="twitter:card"' site/index.html
          test -f site/styles.css
      - name: Local asset references resolve
        run: |
          # Every href/src that points at a local file must exist.
          grep -oE '(href|src)="[^"#:]+\.(css|js|png|jpg|svg)"' site/index.html \
            | sed -E 's/.*="([^"]+)"/\1/' \
            | while read -r asset; do test -f "site/$asset" || { echo "Missing asset: $asset"; exit 1; }; done
