<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Pixypuala — Engineering that proves itself, not just ships.">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#f7f5f0"/>
			<stop offset="1" stop-color="#ece7dc"/>
		</linearGradient>
	</defs>

	<rect width="1200" height="630" fill="url(#bg)"/>
	<rect x="0" y="0" width="16" height="630" fill="#0b5d4e"/>

	<g font-family="Iowan Old Style, Palatino Linotype, Palatino, Georgia, serif">
		<text x="90" y="150" font-size="34" letter-spacing="6" fill="#0b5d4e" font-weight="600">P I X Y P U A L A</text>
		<text x="90" y="300" font-size="88" fill="#16191f" font-weight="600">Engineering that proves</text>
		<text x="90" y="392" font-size="88" fill="#16191f" font-weight="600">itself, not just ships.</text>
	</g>

	<g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
		<text x="90" y="474" font-size="30" fill="#545b66">Reference implementations with tests, CI, and honest documentation.</text>
		<text x="90" y="556" font-size="26" fill="#0b5d4e" letter-spacing="2" font-weight="600">WORDPRESS · WOOCOMMERCE · ACCESSIBILITY · RELEASE ASSURANCE</text>
	</g>
